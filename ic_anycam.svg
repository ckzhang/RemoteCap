<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="g-light" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F0F4F8"/><stop offset="100%" stop-color="#CFD8DC"/></linearGradient>
        <linearGradient id="g-strap2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#90A4AE"/><stop offset="50%" stop-color="#CFD8DC"/><stop offset="100%" stop-color="#90A4AE"/></linearGradient>
        <linearGradient id="g-indigo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3D5AFE"/><stop offset="100%" stop-color="#1A237E"/></linearGradient>
        <linearGradient id="g-coral" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF7043"/><stop offset="100%" stop-color="#FF3D00"/></linearGradient>
        <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.6"/></filter>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-strong"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- Background layer for Adaptive Icon -->
    <rect width="128" height="128" fill="#1c1c22" />
    
    <!-- Phone -->
    <rect x="20" y="8" width="52" height="80" rx="7.8" fill="url(#g-light)" filter="url(#shadow)"/>
    <rect x="23" y="11" width="46" height="74" rx="4.1" fill="#000" opacity="0.4"/>
    
    <!-- Bullseye -->
    <circle cx="46" cy="70" r="10" fill="none" stroke="url(#g-indigo)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="46" cy="70" r="2.5" fill="url(#g-indigo)"/>
    <path d="M33 70 h5 M59 70 h-5 M46 57 v5 M46 83 v-5" stroke="url(#g-indigo)" stroke-width="2"/>
    
    <!-- Straps -->
    <rect x="74" y="52" width="24" height="10" fill="url(#g-strap2)"/>
    <rect x="76" y="48" width="20" height="4" fill="#666"/>
    <rect x="74" y="110" width="24" height="10" fill="url(#g-strap2)"/>
    <rect x="76" y="120" width="20" height="4" fill="#666"/>
    
    <!-- Watch Body (Squircle) -->
    <rect x="60" y="60" width="52" height="52" rx="10.4" fill="url(#g-light)" filter="url(#shadow)"/>
    <rect x="63" y="63" width="46" height="46" rx="7.8" fill="#0a0a0c"/>
    
    <!-- Watch Crown -->
    <rect x="110" y="80" width="5" height="12" rx="2" fill="#999"/>
    
    <!-- Pill Remote -->
    <rect x="77.55" y="69.1" width="16.9" height="33.8" rx="8.45" fill="#222" stroke="#B0BEC5" stroke-width="1.5"/>
    <circle cx="86" cy="82.1" r="5.915" fill="url(#g-coral)" filter="url(#glow-strong)"/>
    <circle cx="86" cy="95.1" r="1.69" fill="#777"/>
    
    <!-- Radio Waves Top -->
    <g transform="translate(86, 48)">
        <path d="M -6 -4 A 8 8 0 0 1 6 -4" fill="none" stroke="#FF9100" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M -12 -10 A 16 16 0 0 1 12 -10" fill="none" stroke="#FF9100" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
        <path d="M -18 -16 A 24 24 0 0 1 18 -16" fill="none" stroke="#FF9100" stroke-width="2.5" stroke-linecap="round"/>
    </g>
</svg>
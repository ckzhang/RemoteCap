<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>50 AnyCam Concepts</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f13; color: #fff; margin: 0; padding: 40px; }
        h1 { text-align: center; color: #00E5FF; margin-bottom: 10px; font-size: 2.5rem; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; max-width: 1400px; margin: auto; }
        .card { background: #1c1c22; padding: 20px 10px; border-radius: 16px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.5); transition: all 0.3s ease; border: 1px solid #2a2a35; }
        .card:hover { transform: translateY(-8px) scale(1.02); border-color: #00E5FF; background: #23232c; box-shadow: 0 12px 24px rgba(0,229,255,0.2); }
        svg { width: 100px; height: 100px; margin: 0 auto 15px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); }
        .num { font-size: 11px; color: #666; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        .desc { font-size: 13px; color: #ccc; font-weight: 500; padding: 0 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <h1>50 Refined AnyCam Concepts</h1>
    <p class="subtitle">Detailed SVG variations covering tech, minimal, HUD, shapes, and monograms.</p>
    <div class="grid" id="app"></div>

    <script>
        const defs = `
            <defs>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF2A65"/><stop offset="100%" stop-color="#FF7B93"/></linearGradient>
                <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#0072FF"/></linearGradient>
                <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#FF8C00"/></linearGradient>
                <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8A2BE2"/><stop offset="100%" stop-color="#4B0082"/></linearGradient>
                <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00FF87"/><stop offset="100%" stop-color="#60EFFF"/></linearGradient>
                <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E0E0E0"/><stop offset="50%" stop-color="#999999"/><stop offset="100%" stop-color="#444444"/></linearGradient>
                <linearGradient id="darkMetal" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#444"/><stop offset="100%" stop-color="#111"/></linearGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
                <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
        `;

        const icons = [
            // 1-10: Detailed Lenses & Watches
            {n:"01. Premium Lens", c:`<circle cx="64" cy="64" r="56" fill="url(#metal)" filter="url(#shadow)"/><circle cx="64" cy="64" r="48" fill="url(#darkMetal)"/><path d="M64 16 L84 64 L64 112 L44 64 Z" fill="url(#g1)" opacity="0.8"/><circle cx="64" cy="64" r="20" fill="none" stroke="#fff" stroke-width="4"/>`},
            {n:"02. Hexagon HUD", c:`<polygon points="64,10 110,37 110,91 64,118 18,91 18,37" fill="none" stroke="url(#g2)" stroke-width="8" filter="url(#glow2)"/><circle cx="64" cy="64" r="24" fill="url(#g2)" opacity="0.8"/><circle cx="64" cy="64" r="8" fill="#fff"/>`},
            {n:"03. Diamond Intersect", c:`<path d="M64 10 L118 64 L64 118 L10 64 Z" fill="url(#darkMetal)" filter="url(#shadow)"/><circle cx="64" cy="64" r="36" fill="none" stroke="url(#g3)" stroke-width="6"/><circle cx="64" cy="64" r="16" fill="url(#g3)"/>`},
            {n:"04. Ribbon 'A'", c:`<path d="M64 16 L100 100 L76 100 L64 68 L52 100 L28 100 Z" fill="url(#g1)" filter="url(#shadow)"/><path d="M44 80 L84 80" stroke="#fff" stroke-width="8" stroke-linecap="round"/>`},
            {n:"05. Ribbon 'C' Focus", c:`<path d="M84 24 A 48 48 0 1 0 84 104" fill="none" stroke="url(#g2)" stroke-width="16" stroke-linecap="round" filter="url(#shadow)"/><circle cx="64" cy="64" r="16" fill="url(#g1)"/>`},
            {n:"06. Venn Glass Lens", c:`<circle cx="48" cy="64" r="36" fill="url(#g1)" opacity="0.7" filter="url(#glow2)"/><circle cx="80" cy="64" r="36" fill="url(#g2)" opacity="0.7" filter="url(#glow2)"/><path d="M64 36 A 28 28 0 0 1 64 92 A 28 28 0 0 1 64 36" fill="#fff" opacity="0.9"/>`},
            {n:"07. Radar Sweep", c:`<circle cx="64" cy="64" r="56" fill="none" stroke="url(#darkMetal)" stroke-width="8"/><path d="M64 64 L64 8 A 56 56 0 0 1 114 40 Z" fill="url(#g5)" opacity="0.6"/><circle cx="64" cy="64" r="12" fill="#fff"/>`},
            {n:"08. Cyber Crosshair", c:`<path d="M20 40 L20 20 L40 20 M88 20 L108 20 L108 40 M108 88 L108 108 L88 108 M40 108 L20 108 L20 88" fill="none" stroke="url(#g2)" stroke-width="8" stroke-linecap="square"/><circle cx="64" cy="64" r="12" fill="url(#g1)" filter="url(#glow1)"/>`},
            {n:"09. Bio-Mech Eye", c:`<path d="M10 64 Q64 10 118 64 Q64 118 10 64" fill="url(#darkMetal)" filter="url(#shadow)"/><circle cx="64" cy="64" r="28" fill="none" stroke="url(#g3)" stroke-width="8"/><circle cx="64" cy="64" r="12" fill="url(#g3)"/>`},
            {n:"10. Minimal Squircle", c:`<rect x="16" y="16" width="96" height="96" rx="32" fill="none" stroke="url(#g4)" stroke-width="12"/><circle cx="80" cy="48" r="16" fill="url(#g1)"/>`},

            // 11-20: Shapes & Action
            {n:"11. Shield Shutter", c:`<path d="M64 10 L110 30 L110 70 Q110 110 64 120 Q18 110 18 70 L18 30 Z" fill="url(#metal)" filter="url(#shadow)"/><circle cx="64" cy="60" r="24" fill="url(#darkMetal)"/><circle cx="64" cy="60" r="10" fill="url(#g2)"/>`},
            {n:"12. Atom Orb", c:`<ellipse cx="64" cy="64" rx="56" ry="20" fill="none" stroke="url(#g2)" stroke-width="6" transform="rotate(45 64 64)"/><ellipse cx="64" cy="64" rx="56" ry="20" fill="none" stroke="url(#g1)" stroke-width="6" transform="rotate(-45 64 64)"/><circle cx="64" cy="64" r="16" fill="#fff" filter="url(#glow2)"/>`},
            {n:"13. Isometric Watch", c:`<polygon points="64,20 108,44 108,84 64,108 20,84 20,44" fill="url(#darkMetal)" filter="url(#shadow)"/><polygon points="64,30 96,48 64,66 32,48" fill="url(#g3)"/><polygon points="64,66 96,48 96,76 64,94" fill="url(#g3)" opacity="0.6"/>`},
            {n:"14. Liquid Droplet", c:`<path d="M64 10 C64 10 20 50 20 80 A 44 44 0 0 0 108 80 C108 50 64 10 64 10 Z" fill="url(#g2)" filter="url(#shadow)"/><circle cx="64" cy="80" r="16" fill="#fff"/>`},
            {n:"15. Flash Starburst", c:`<path d="M64 4 L74 44 L114 54 L74 64 L64 104 L54 64 L14 54 L54 44 Z" fill="url(#g3)" filter="url(#glow1)"/><circle cx="64" cy="54" r="12" fill="#fff"/>`},
            {n:"16. Watch Action", c:`<circle cx="64" cy="64" r="56" fill="url(#darkMetal)" stroke="url(#metal)" stroke-width="6"/><path d="M54 44 L84 64 L54 84 Z" fill="url(#g5)" filter="url(#glow2)"/>`},
            {n:"17. Octagon Maze", c:`<polygon points="44,10 84,10 118,44 118,84 84,118 44,118 10,84 10,44" fill="none" stroke="url(#g4)" stroke-width="8"/><rect x="40" y="40" width="48" height="48" fill="none" stroke="url(#g1)" stroke-width="8"/><circle cx="64" cy="64" r="8" fill="#fff"/>`},
            {n:"18. Converging Arrows", c:`<path d="M64 10 L64 40 M64 118 L64 88 M10 64 L40 64 M118 64 L88 64" stroke="url(#g2)" stroke-width="10" stroke-linecap="round"/><path d="M54 30 L64 40 L74 30 M54 98 L64 88 L74 98 M30 54 L40 64 L30 74 M98 54 L88 64 L98 74" fill="none" stroke="url(#g2)" stroke-width="6"/>`},
            {n:"19. Diverging Arrows", c:`<circle cx="64" cy="64" r="24" fill="url(#darkMetal)" stroke="url(#g1)" stroke-width="6"/><path d="M64 30 L64 10 M64 98 L64 118 M30 64 L10 64 M98 64 L118 64" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/><path d="M54 20 L64 10 L74 20 M54 108 L64 118 L74 108 M20 54 L10 64 L20 74 M108 54 L118 64 L108 74" fill="none" stroke="url(#g1)" stroke-width="6"/>`},
            {n:"20. Infinity Glow", c:`<path d="M36 44 A 20 20 0 1 0 36 84 C 56 84 72 44 92 44 A 20 20 0 1 1 92 84 C 72 84 56 44 36 44" fill="none" stroke="url(#darkMetal)" stroke-width="16"/><path d="M36 44 A 20 20 0 0 0 36 84" fill="none" stroke="url(#g2)" stroke-width="16" filter="url(#glow2)"/>`},

            // 21-30: Social, Audio & Abstract
            {n:"21. Social Heart", c:`<path d="M64 110 C64 110 14 74 14 40 A 26 26 0 0 1 64 24 A 26 26 0 0 1 114 40 C114 74 64 110 64 110 Z" fill="url(#g1)" filter="url(#shadow)"/><circle cx="64" cy="46" r="16" fill="#fff" opacity="0.9"/>`},
            {n:"22. Flying Wing", c:`<path d="M20 64 Q64 20 108 64 Q64 40 20 64 Z M20 84 Q64 40 108 84 Q64 60 20 84 Z" fill="url(#g2)" filter="url(#shadow)"/>`},
            {n:"23. Circular Wave", c:`<circle cx="64" cy="64" r="12" fill="url(#g3)"/><circle cx="64" cy="64" r="28" fill="none" stroke="url(#g3)" stroke-width="4" stroke-dasharray="8 8"/><circle cx="64" cy="64" r="48" fill="none" stroke="url(#g3)" stroke-width="6" stroke-dasharray="16 16"/>`},
            {n:"24. Watch Waveform", c:`<rect x="24" y="24" width="80" height="80" rx="40" fill="url(#darkMetal)"/><path d="M40 64 L40 50 M52 64 L52 30 M64 64 L64 14 M76 64 L76 40 M88 64 L88 56" stroke="url(#g5)" stroke-width="6" stroke-linecap="round" filter="url(#glow2)"/>`},
            {n:"25. Chain Links", c:`<rect x="24" y="40" width="56" height="48" rx="24" fill="none" stroke="url(#g1)" stroke-width="12"/><rect x="48" y="40" width="56" height="48" rx="24" fill="none" stroke="url(#g2)" stroke-width="12" opacity="0.8"/>`},
            {n:"26. Keyhole Target", c:`<circle cx="64" cy="50" r="24" fill="url(#g4)"/><path d="M54 64 L74 64 L84 100 L44 100 Z" fill="url(#g4)"/><circle cx="64" cy="64" r="56" fill="none" stroke="url(#metal)" stroke-width="6"/>`},
            {n:"27. Finger Tap", c:`<circle cx="64" cy="64" r="48" fill="none" stroke="url(#g5)" stroke-width="4" filter="url(#glow2)"/><path d="M64 64 L84 110 L94 100 L74 54 A 10 10 0 0 0 54 64 Z" fill="#fff"/><circle cx="64" cy="64" r="8" fill="url(#g5)"/>`},
            {n:"28. Glitch Neon", c:`<circle cx="60" cy="64" r="40" fill="none" stroke="#FF0055" stroke-width="8" filter="url(#glow1)"/><circle cx="68" cy="64" r="40" fill="none" stroke="#00E5FF" stroke-width="8" filter="url(#glow1)"/><path d="M10 64 L118 64" stroke="#fff" stroke-width="4" stroke-dasharray="10 20"/>`},
            {n:"29. Origami Star", c:`<polygon points="64,10 76,52 118,64 76,76 64,118 52,76 10,64 52,52" fill="url(#g3)" filter="url(#shadow)"/><polygon points="64,10 76,52 64,64 52,52" fill="#fff" opacity="0.3"/>`},
            {n:"30. Layered Disks", c:`<ellipse cx="64" cy="84" rx="50" ry="20" fill="url(#darkMetal)"/><ellipse cx="64" cy="64" rx="50" ry="20" fill="url(#g1)"/><ellipse cx="64" cy="44" rx="50" ry="20" fill="url(#g2)"/><circle cx="64" cy="44" r="10" fill="#fff"/>`},

            // 31-40: Metaphorical & Nature
            {n:"31. Crescent Lens", c:`<path d="M74 14 A 50 50 0 1 0 114 54 A 40 40 0 1 1 74 14 Z" fill="url(#g2)" filter="url(#shadow)"/><circle cx="64" cy="74" r="16" fill="url(#g1)"/>`},
            {n:"32. Gear 8-Teeth", c:`<path d="M56 10 L72 10 L76 26 A 40 40 0 0 1 90 34 L104 24 L114 38 L100 48 A 40 40 0 0 1 104 64 L118 68 L114 84 L100 80 A 40 40 0 0 1 90 94 L104 104 L90 118 L76 102 A 40 40 0 0 1 64 104 L60 118 L44 114 L48 100 A 40 40 0 0 1 34 90 L20 100 L10 86 L24 76 A 40 40 0 0 1 20 64 L4 60 L10 44 L26 48 A 40 40 0 0 1 36 34 L22 20 L36 10 L48 24 A 40 40 0 0 1 64 22 Z" fill="url(#darkMetal)"/><circle cx="64" cy="64" r="20" fill="url(#g2)" filter="url(#glow2)"/>`},
            {n:"33. Shuriken Shutter", c:`<path d="M64 10 L74 54 L118 64 L74 74 L64 118 L54 74 L10 64 L54 54 Z" fill="url(#metal)"/><circle cx="64" cy="64" r="18" fill="url(#g1)"/>`},
            {n:"34. Target Arrow", c:`<circle cx="64" cy="64" r="50" fill="none" stroke="url(#g3)" stroke-width="12"/><circle cx="64" cy="64" r="24" fill="url(#g3)"/><path d="M10 118 L64 64" stroke="#fff" stroke-width="8" stroke-linecap="round"/><polygon points="64,64 50,70 70,50" fill="#fff"/>`},
            {n:"35. Galaxy Vortex", c:`<path d="M64 64 Q94 24 114 64 Q84 104 64 64 Q34 104 14 64 Q44 24 64 64" fill="none" stroke="url(#g4)" stroke-width="6"/><circle cx="64" cy="64" r="12" fill="#fff" filter="url(#glow1)"/>`},
            {n:"36. Matrix Grid", c:`<circle cx="34" cy="34" r="10" fill="url(#darkMetal)"/><circle cx="64" cy="34" r="10" fill="url(#darkMetal)"/><circle cx="94" cy="34" r="10" fill="url(#darkMetal)"/><circle cx="34" cy="64" r="10" fill="url(#darkMetal)"/><circle cx="64" cy="64" r="14" fill="url(#g1)" filter="url(#glow2)"/><circle cx="94" cy="64" r="10" fill="url(#darkMetal)"/><circle cx="34" cy="94" r="10" fill="url(#darkMetal)"/><circle cx="64" cy="94" r="10" fill="url(#darkMetal)"/><circle cx="94" cy="94" r="10" fill="url(#darkMetal)"/>`},
            {n:"37. Dual Triangles", c:`<polygon points="64,20 104,90 24,90" fill="none" stroke="url(#g2)" stroke-width="10"/><polygon points="64,108 24,38 104,38" fill="none" stroke="url(#g1)" stroke-width="10" opacity="0.8"/>`},
            {n:"38. Crown Lens", c:`<path d="M20 50 L34 84 L94 84 L108 50 L84 64 L64 34 L44 64 Z" fill="url(#g3)" filter="url(#shadow)"/><circle cx="64" cy="64" r="8" fill="#111"/>`},
            {n:"39. Classic Silhouette", c:`<rect x="24" y="34" width="80" height="60" rx="8" fill="url(#darkMetal)"/><rect x="44" y="24" width="40" height="10" fill="url(#metal)"/><circle cx="64" cy="64" r="20" fill="none" stroke="url(#g5)" stroke-width="6"/>`},
            {n:"40. Robot Eye", c:`<rect x="24" y="34" width="80" height="60" rx="30" fill="url(#g4)"/><circle cx="48" cy="64" r="12" fill="#fff"/><circle cx="80" cy="64" r="12" fill="#fff"/><path d="M48 64 L80 64" stroke="#fff" stroke-width="4"/>`},

            // 41-50: Abstract, Concepts & Depth
            {n:"41. Hourglass Sync", c:`<path d="M34 24 L94 24 L64 64 L94 104 L34 104 L64 64 Z" fill="none" stroke="url(#g1)" stroke-width="10" stroke-linejoin="round"/><circle cx="64" cy="64" r="10" fill="#fff" filter="url(#glow2)"/>`},
            {n:"42. Compass Focus", c:`<circle cx="64" cy="64" r="50" fill="none" stroke="url(#metal)" stroke-width="4"/><path d="M64 14 L74 54 L114 64 L74 74 L64 114 L54 74 L14 64 L54 54 Z" fill="url(#g2)"/><circle cx="64" cy="64" r="8" fill="#111"/>`},
            {n:"43. Sparkle Magic", c:`<path d="M64 10 C64 40 88 64 118 64 C88 64 64 88 64 118 C64 88 40 64 10 64 C40 64 64 40 64 10 Z" fill="url(#g3)" filter="url(#glow1)"/>`},
            {n:"44. DNA Helix", c:`<path d="M24 24 Q 64 64 24 104" fill="none" stroke="url(#g1)" stroke-width="12" stroke-linecap="round"/><path d="M104 24 Q 64 64 104 104" fill="none" stroke="url(#g2)" stroke-width="12" stroke-linecap="round"/><circle cx="64" cy="64" r="12" fill="#fff"/>`},
            {n:"45. Magnifying Target", c:`<circle cx="54" cy="54" r="30" fill="none" stroke="url(#g5)" stroke-width="10"/><line x1="76" y1="76" x2="104" y2="104" stroke="url(#g5)" stroke-width="12" stroke-linecap="round"/><circle cx="54" cy="54" r="10" fill="#fff"/>`},
            {n:"46. Lightning Watch", c:`<rect x="34" y="34" width="60" height="60" rx="16" fill="url(#darkMetal)" stroke="url(#metal)" stroke-width="4"/><path d="M70 44 L54 64 L66 64 L58 84 L76 60 L62 60 Z" fill="url(#g3)" filter="url(#glow2)"/>`},
            {n:"47. Overlap Squares", c:`<rect x="24" y="24" width="50" height="50" rx="12" fill="url(#g1)" opacity="0.8"/><rect x="54" y="54" width="50" height="50" rx="12" fill="url(#g2)" opacity="0.8"/><circle cx="64" cy="64" r="10" fill="#fff"/>`},
            {n:"48. Circular Maze", c:`<circle cx="64" cy="64" r="48" fill="none" stroke="url(#metal)" stroke-width="6"/><circle cx="64" cy="64" r="32" fill="none" stroke="url(#metal)" stroke-width="6" stroke-dasharray="20 10"/><circle cx="64" cy="64" r="16" fill="url(#g4)"/>`},
            {n:"49. A/C Neon Tube", c:`<path d="M54 94 L64 34 L84 94" fill="none" stroke="url(#g1)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow2)"/><path d="M84 44 A 26 26 0 1 0 84 84" fill="none" stroke="url(#g2)" stroke-width="10" stroke-linecap="round" filter="url(#glow2)"/>`},
            {n:"50. Core Engine", c:`<circle cx="64" cy="64" r="54" fill="url(#darkMetal)"/><path d="M64 10 L64 30 M64 98 L64 118 M10 64 L30 64 M98 64 L118 64 M26 26 L40 40 M88 88 L102 102 M26 102 L40 88 M102 26 L88 40" stroke="url(#g5)" stroke-width="6"/><circle cx="64" cy="64" r="20" fill="#fff" filter="url(#glow1)"/>`}
        ];

        const container = document.getElementById('app');
        container.innerHTML = icons.map(i => `
            <div class="card">
                <div class="num">${i.n.split('. ')[0]}</div>
                <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                    ${defs}
                    ${i.c}
                </svg>
                <div class="desc">${i.n.split('. ')[1]}</div>
            </div>
        `).join('');
    </script>
</body>
</html>

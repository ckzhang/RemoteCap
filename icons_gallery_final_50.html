<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>50 AnyCam Fused Concepts</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f13; color: #fff; margin: 0; padding: 40px; }
        h1 { text-align: center; color: #00E5FF; margin-bottom: 10px; font-size: 2.2rem; }
        p.subtitle { text-align: center; color: #aaa; margin-bottom: 40px; font-size: 1.1rem; }
        .category-title { grid-column: 1 / -1; font-size: 1.3rem; color: #FF1744; margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: #1c1c22; padding: 20px 10px; border-radius: 12px; text-align: center; border: 1px solid #2a2a35; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-5px); border-color: #00E5FF; background: #23232c; box-shadow: 0 8px 16px rgba(0,229,255,0.2); }
        svg { width: 90px; height: 90px; margin: 0 auto 15px; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .num { font-size: 12px; color: #00E5FF; margin-bottom: 8px; font-weight: bold; }
        .desc { font-size: 12px; color: #ccc; padding: 0 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <h1>50 Highly-Refined Fused Concepts</h1>
    <p class="subtitle">Blending: Remote Pills, Overlapping Lenses, Minimal Cameras, Signals, and Cyber Targets.</p>
    <div class="grid" id="app"></div>

    <script>
        const defs = '<defs>' +

        let html = '';
        icons.forEach(i => {
            if (i.cat) {
                html += '<div class="category-title">' + i.cat + '</div>';
            } else {
                html += '<div class="card">' +
                    '<div class="num">' + i.n + '</div>' +
                    '<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">' +
                        defs + i.c +
                    '</svg>' +
                    '<div class="desc">' + i.d + '</div>' +
                '</div>';
            }
        });
        document.getElementById('app').innerHTML = html;

</body>
</html>
